<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>로그인 - 배워볼LANG</title>
  <meta name="description" content="배워볼LANG 회원 로그인 페이지" />
  <meta name="robots" content="noindex, nofollow" />
  <link rel="stylesheet" href="../assets/css/common.css" />
  <style>
    .login-page {
      min-height: calc(100vh - var(--nav-height));
      display: flex;
      align-items: center;
      justify-content: center;
      background: var(--color-primary-bg);
      padding: var(--spacing-xl) var(--spacing-md);
    }

    .login-card {
      background: var(--color-white);
      border-radius: var(--radius-xl);
      box-shadow: var(--shadow-lg);
      padding: var(--spacing-2xl) var(--spacing-xl);
      width: 100%;
      max-width: 440px;
    }

    .login-card__logo {
      font-size: var(--font-size-2xl);
      font-weight: 800;
      color: var(--color-primary);
      text-align: center;
      margin-bottom: var(--spacing-sm);
    }

    .login-card__title {
      font-size: var(--font-size-2xl);
      font-weight: 700;
      color: var(--color-text-dark);
      text-align: center;
      margin-bottom: var(--spacing-xs);
    }

    .login-card__subtitle {
      font-size: var(--font-size-sm);
      color: var(--color-text-medium);
      text-align: center;
      margin-bottom: var(--spacing-xl);
    }

    .form-group {
      margin-bottom: var(--spacing-lg);
    }

    .form-label {
      display: block;
      font-size: var(--font-size-sm);
      font-weight: 600;
      color: var(--color-text-dark);
      margin-bottom: var(--spacing-xs);
    }

    .form-input {
      width: 100%;
      padding: 0.75rem var(--spacing-md);
      border: 1.5px solid var(--color-border);
      border-radius: var(--radius-md);
      font-size: var(--font-size-base);
      color: var(--color-text-dark);
      background: var(--color-white);
      transition: border-color var(--transition-fast);
      outline: none;
    }

    .form-input:focus {
      border-color: var(--color-primary);
      box-shadow: 0 0 0 3px rgba(255, 107, 43, 0.12);
    }

    .form-input.error {
      border-color: var(--color-error);
    }

    .password-wrap {
      position: relative;
    }

    .password-toggle {
      position: absolute;
      right: var(--spacing-md);
      top: 50%;
      transform: translateY(-50%);
      background: none;
      border: none;
      cursor: pointer;
      color: var(--color-text-light);
      font-size: var(--font-size-sm);
      padding: 0;
      line-height: 1;
    }

    .password-toggle:hover {
      color: var(--color-text-medium);
    }

    .form-error {
      font-size: var(--font-size-xs);
      color: var(--color-error);
      margin-top: var(--spacing-xs);
      min-height: 1.2em;
    }

    .login-error-box {
      background: #FEF2F2;
      border: 1px solid #FECACA;
      border-radius: var(--radius-md);
      padding: var(--spacing-md);
      margin-bottom: var(--spacing-lg);
      font-size: var(--font-size-sm);
      color: #B91C1C;
      display: none;
    }

    .login-error-box.show {
      display: block;
    }

    .btn-login {
      width: 100%;
      padding: 0.875rem;
      background: var(--color-primary);
      color: var(--color-white);
      border: none;
      border-radius: var(--radius-md);
      font-size: var(--font-size-base);
      font-weight: 700;
      cursor: pointer;
      transition: background var(--transition-fast), opacity var(--transition-fast);
      margin-top: var(--spacing-sm);
    }

    .btn-login:hover {
      background: var(--color-primary-dark);
    }

    .btn-login:disabled {
      opacity: 0.6;
      cursor: not-allowed;
    }

    .login-links {
      text-align: center;
      margin-top: var(--spacing-lg);
      font-size: var(--font-size-sm);
      color: var(--color-text-medium);
    }

    .login-links a {
      color: var(--color-primary);
      font-weight: 600;
      text-decoration: none;
    }

    .login-links a:hover {
      text-decoration: underline;
    }
  </style>
</head>
<body>

<!-- 내비게이션 -->
<nav class="navbar" id="mainNav" role="navigation" aria-label="주 내비게이션">
  <div class="container navbar__inner">
    <a href="../index.html" class="navbar__logo" aria-label="배워볼LANG 홈으로">
      <span class="navbar__logo-icon" aria-hidden="true">🌳</span>
      배워볼LANG
    </a>
    <div style="font-size:0.875rem; color:var(--color-text-medium);">
      아직 회원이 아니신가요?
      <a href="register.html" style="color:var(--color-primary); font-weight:600;">회원가입</a>
    </div>
  </div>
</nav>

<!-- 로그인 본문 -->
<div class="login-page">
  <div class="login-card" role="main">

    <div class="login-card__logo">🌳 배워볼LANG</div>
    <h1 class="login-card__title">로그인</h1>
    <p class="login-card__subtitle">언어의 나무를 함께 키워가요</p>

    <div class="login-error-box" id="loginErrorBox" role="alert"></div>

    <form id="loginForm" novalidate>

      <div class="form-group">
        <label class="form-label" for="loginEmail">
          이메일 주소
        </label>
        <input
          type="email"
          id="loginEmail"
          name="loginEmail"
          class="form-input"
          placeholder="example@email.com"
          required
          aria-required="true"
          autocomplete="email"
        />
        <div class="form-error" id="emailError" role="alert"></div>
      </div>

      <div class="form-group">
        <label class="form-label" for="loginPassword">
          비밀번호
        </label>
        <div class="password-wrap">
          <input
            type="password"
            id="loginPassword"
            name="loginPassword"
            class="form-input"
            placeholder="비밀번호 입력"
            required
            aria-required="true"
            autocomplete="current-password"
          />
          <button
            type="button"
            class="password-toggle"
            id="passwordToggle"
            aria-label="비밀번호 표시/숨기기"
          >보기</button>
        </div>
        <div class="form-error" id="passwordError" role="alert"></div>
      </div>

      <button type="submit" class="btn-login" id="loginBtn">
        로그인
      </button>

    </form>

    <div class="login-links">
      아직 회원이 아니신가요? <a href="register.html">회원가입</a>
    </div>

  </div>
</div>

<!-- 푸터 -->
<footer class="footer" role="contentinfo">
  <div class="container">
    <div class="footer__bottom" style="border-top:none; padding-top:0;">
      <p class="footer__bottom-text">
        © 2024 배워볼LANG. All rights reserved. | 대표이사: 홍길동 | 사업자등록번호: 123-45-67890
      </p>
      <div class="footer__bottom-links">
        <a href="terms.html">이용약관</a>
        <a href="privacy-policy.html"><strong>개인정보처리방침</strong></a>
      </div>
    </div>
  </div>
</footer>

<script src="../assets/js/common.js"></script>
<script src="../assets/js/login.js"></script>
</body>
</html>
